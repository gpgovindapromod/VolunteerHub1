{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}
{% block footer %}{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:24px;">
      <div class="auth-logo-icon" style="background:linear-gradient(135deg,#ff416c,#cc0033);"><i class="ri-shield-keyhole-line"></i></div>
      <div class="auth-title">Admin Access</div>
      <div class="auth-subtitle">Restricted — authorized personnel only</div>
    </div>
    <div class="alert alert-warning" style="margin-bottom:20px;">
      <i class="ri-alert-line"></i> This panel is for system administrators only.
    </div>
    <form action="{{ url_for('admin.login') }}" method="POST" data-validate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="admin" required autocomplete="username">
        <div class="form-error" id="username-error"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        <div class="form-error" id="password-error"></div>
      </div>
      <button type="submit" class="btn btn-danger w-full" style="padding:13px;">
        <i class="ri-shield-keyhole-line"></i> Admin Sign In
      </button>
    </form>
    <div class="auth-footer"><a href="{{ url_for('auth.login') }}" style="color:var(--muted);">← Back to regular login</a></div>
  </div>
</div>
{% endblock %}
